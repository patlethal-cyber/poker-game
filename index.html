<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Poker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2660;</text></svg>">
    <style>
/* === main.css === */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --felt-green: #1a6b37;
    --felt-dark: #0d4a24;
    --felt-light: #228b47;
    --wood-brown: #4a2c0a;
    --wood-light: #6b3d1a;
    --gold: #d4a843;
    --gold-light: #e8c96a;
    --chip-white: #f0f0f0;
    --chip-red: #cc3333;
    --chip-blue: #3366cc;
    --chip-green: #33aa55;
    --chip-black: #333333;
    --card-white: #f8f8f0;
    --text-light: #e8e8e8;
    --text-dim: #999;
    --danger: #e74c3c;
    --success: #2ecc71;
    --warning: #f39c12;
    --bg-dark: #1a1a2e;
    --bg-darker: #0f0f1e;
    --shadow-heavy: 0 8px 32px rgba(0,0,0,0.5);
    --shadow-medium: 0 4px 16px rgba(0,0,0,0.3);
    --shadow-light: 0 2px 8px rgba(0,0,0,0.2);

    /* Responsive scale: one knob drives density, set per media query below */
    --scale: 1;
    --ui-font: calc(15px * var(--scale));
    --btn-h: max(44px, calc(48px * var(--scale)));
    --seat-w: calc(120px * var(--scale));
    --card-w: calc(56px * var(--scale));
    --card-h: calc(80px * var(--scale));
}

@media (max-width: 1099px) { :root { --scale: 0.9; } }
@media (max-width: 899px)  { :root { --scale: 0.82; } }
@media (max-width: 699px)  { :root { --scale: 0.74; } }
@media (max-width: 499px)  { :root { --scale: 0.64; } }
@media (max-width: 359px)  { :root { --scale: 0.56; } }

html, body {
    height: 100%;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-size: var(--ui-font);
}

button, select, input {
    touch-action: manipulation;
}

#game-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Message log at top */
#message-log {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    z-index: 99;
    padding: 0 20px;
    justify-content: flex-start;
}

#message-text {
    font-size: 15px;
    color: var(--gold-light);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    transition: opacity 0.3s;
    text-align: left;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* Game info bar */
#game-info {
    position: absolute;
    top: 12px;
    right: 112px;
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--text-dim);
    z-index: 100;
}

@media (max-width: 599px) {
    #game-info {
        right: 104px;
        gap: 6px;
        font-size: 11px;
    }
    #game-info span {
        padding: 3px 7px;
        border-radius: 9px;
        white-space: nowrap;
    }
}
@media (max-width: 359px) {
    #game-info {
        left: 8px;
        right: 104px;
        gap: 4px;
        font-size: 10px;
        overflow: hidden;
        flex-wrap: nowrap;
    }
    #game-info span { padding: 2px 5px; }
    #game-info span:nth-child(3) { display: none; }
}

#btn-mute, #btn-history {
    position: absolute;
    top: 8px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.4);
    color: var(--gold-light);
    font-size: 18px;
    cursor: pointer;
    z-index: 110;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}
#btn-mute { right: 12px; }
#btn-history { right: 60px; font-size: 17px; }
#btn-mute.muted { opacity: 0.55; }
@media (hover: hover) {
    #btn-mute:hover, #btn-history:hover { background: rgba(0,0,0,0.7); border-color: var(--gold); }
}

#game-info span {
    background: rgba(0,0,0,0.4);
    padding: 4px 12px;
    border-radius: 12px;
}

/* Table container — fluid, aspect-ratio based */
#table-area {
    position: relative;
    width: min(95vw, 1200px);
    aspect-ratio: 16 / 10;
    max-height: 72vh;
}

/* Portrait / narrow devices: swap to a taller aspect ratio */
@media (max-aspect-ratio: 3/4) {
    #table-area {
        width: min(96vw, 600px);
        aspect-ratio: 4 / 5;
        max-height: 78vh;
    }
}

/* Small-phone portrait: leave room for the bottom action panel */
@media (max-width: 499px) and (orientation: portrait) {
    #table-area {
        max-height: calc(100dvh - 240px);
    }
}
@media (max-width: 359px) and (orientation: portrait) {
    #table-area {
        max-height: calc(100dvh - 230px);
    }
}

/* The felt table */
#poker-table {
    position: absolute;
    inset: 60px;
    border-radius: 50% / 42%;
    background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt-green) 40%, var(--felt-dark) 100%);
    border: 14px solid var(--wood-brown);
    box-shadow:
        inset 0 0 80px rgba(0,0,0,0.35),
        inset 0 0 4px rgba(255,255,255,0.05),
        0 0 0 2px #3a1c00,
        0 0 0 6px var(--wood-light),
        0 0 0 8px #3a1c00,
        0 12px 40px rgba(0,0,0,0.6);
}

/* Felt texture overlay */
#poker-table::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.02) 2px,
        rgba(0,0,0,0.02) 4px
    );
    pointer-events: none;
}

#poker-table::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.5;
}

/* Community cards area */
#community-cards {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    display: flex;
    gap: 8px;
    z-index: 10;
}

.community-card-slot {
    width: calc(var(--card-w) * 1.25);
    height: calc(var(--card-h) * 1.25);
    border: 1.5px dashed rgba(255,255,255,0.08);
    border-radius: 8px;
    background: rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

@media (max-width: 600px) {
    #community-cards { gap: 4px; }
    .community-card-slot {
        width: calc(var(--card-w) * 1.05);
        height: calc(var(--card-h) * 1.05);
    }
}

/* Pot display */
#pot-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, 30px);
    text-align: center;
    z-index: 10;
}

#pot-amount {
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

#pot-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
}

/* Player seats */
.player-seat {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 20;
    transition: opacity 0.3s;
}

.player-seat.folded {
    opacity: 0.4;
}

.player-seat.sitting-out {
    opacity: 0.2;
}

.player-info {
    background: rgba(0,0,0,0.7);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: calc(6px * var(--scale)) calc(10px * var(--scale));
    text-align: center;
    width: var(--seat-w);
    min-height: calc(72px * var(--scale));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: calc(2px * var(--scale));
    overflow: hidden;
    backdrop-filter: blur(4px);
    transition: border-color 0.3s, box-shadow 0.3s;
}

.player-seat.active .player-info {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(212, 168, 67, 0.4);
    animation: activePulse 2s ease-in-out infinite;
}

@keyframes activePulse {
    0%, 100% { box-shadow: 0 0 15px rgba(212, 168, 67, 0.3); }
    50% { box-shadow: 0 0 30px rgba(212, 168, 67, 0.6); }
}

.player-seat.winner .player-info {
    border-color: var(--success);
    box-shadow: 0 0 25px rgba(46, 204, 113, 0.5);
}

.player-name {
    font-size: calc(13px * var(--scale));
    line-height: 1.2;
    font-weight: 600;
    color: var(--text-light);
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
}

.player-name .strategy-tag {
    font-size: calc(10px * var(--scale));
    color: var(--text-dim);
    font-weight: 400;
}

@media (max-width: 500px) {
    .player-name .strategy-tag { display: none; }
}

.player-chips {
    font-size: calc(14px * var(--scale));
    line-height: 1.2;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
}

.player-action-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-height: 16px;
    transition: opacity 0.3s;
}

.player-action-label.fold { color: var(--danger); }
.player-action-label.call { color: var(--success); }
.player-action-label.raise, .player-action-label.bet { color: var(--warning); }
.player-action-label.check { color: var(--text-dim); }
.player-action-label.all-in { color: #ff6b6b; font-weight: 800; }

/* Player bet display (near center) */
.player-bet {
    position: absolute;
    font-size: 14px;
    font-weight: 700;
    color: var(--chip-white);
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}

.bet-amount-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--chip-white);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    white-space: nowrap;
}

/* Chip visual system */
.chip {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px dashed rgba(255,255,255,0.5);
    display: inline-block;
    position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.chip-black { background: radial-gradient(circle, #555 40%, #333 100%); }
.chip-blue { background: radial-gradient(circle, #4488dd 40%, #3366cc 100%); }
.chip-red { background: radial-gradient(circle, #ee4444 40%, #cc3333 100%); }
.chip-green { background: radial-gradient(circle, #44bb66 40%, #33aa55 100%); }
.chip-white { background: radial-gradient(circle, #f8f8f8 40%, #ddd 100%); border-color: rgba(0,0,0,0.2); }

.chip-stack {
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    position: relative;
}
.chip-stack .chip {
    margin-top: -17px;
}
.chip-stack .chip:first-child {
    margin-top: 0;
}

.chip-icon {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px dashed rgba(255,255,255,0.4);
    vertical-align: middle;
    margin-right: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

#pot-chips {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 4px;
}

.player-bet.visible {
    opacity: 1;
}

/* Hole cards container */
.player-cards {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
}

/* Dealer button */
.dealer-button {
    position: absolute;
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, #fff 0%, #e8e8e8 50%, #ccc 100%);
    border: 2px solid #aaa;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: #222;
    text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.8);
    z-index: 25;
    transition: left 0.5s, top 0.5s;
}

.position-label {
    position: absolute;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 8px;
    z-index: 24;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.9;
    display: none;
    transition: left 0.5s, top 0.5s, bottom 0.5s, right 0.5s;
}
.position-label.sb {
    background: #5a7;
    color: #fff;
}
.position-label.bb {
    background: #c73;
    color: #fff;
}
/* Position labels are placed dynamically by TableRenderer */

/* Action panel */
#action-panel {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 12px 16px;
    backdrop-filter: blur(8px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    max-width: min(94vw, 720px);
    width: max-content;
}

#action-panel.visible {
    opacity: 1;
    pointer-events: auto;
}

.action-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
}

.action-row-raise {
    flex-wrap: wrap;
    justify-content: center;
}

.action-btn {
    padding: 0 18px;
    min-height: var(--btn-h);
    min-width: 88px;
    border: none;
    border-radius: 10px;
    font-size: calc(14px * var(--scale));
    font-weight: 700;
    cursor: pointer;
    transition: box-shadow 0.15s, background 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex: 1 1 auto;
}

@media (hover: hover) {
    .action-btn:hover {
        box-shadow: var(--shadow-medium);
        filter: brightness(1.08);
    }
}

.action-btn:active { filter: brightness(0.92); }
.action-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

#btn-fold     { background: linear-gradient(180deg, #e74c3c, #c0392b); color: white; }
#btn-check-call { background: linear-gradient(180deg, #2ecc71, #27ae60); color: white; }
#btn-raise    { background: linear-gradient(180deg, #f39c12, #e67e22); color: white; }
#btn-all-in   { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; font-size: calc(12px * var(--scale)); }

/* Raise controls row */
#raise-slider {
    flex: 1 1 160px;
    min-width: 140px;
    -webkit-appearance: none;
    appearance: none;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    outline: none;
}
#raise-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    background: var(--gold);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: var(--shadow-light);
}
#raise-slider::-moz-range-thumb {
    width: 24px;
    height: 24px;
    background: var(--gold);
    border-radius: 50%;
    border: none;
    cursor: pointer;
}

.raise-input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
}
#raise-amount-label {
    font-size: calc(15px * var(--scale));
    font-weight: 700;
    color: var(--gold);
}
#raise-input {
    width: 84px;
    min-height: var(--btn-h);
    padding: 4px 8px;
    font-size: calc(15px * var(--scale));
    font-weight: 700;
    color: var(--gold);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
}
#raise-input::-webkit-outer-spin-button,
#raise-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
#raise-input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.15);
}

.quick-bets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
}
.quick-bet {
    min-height: 36px;
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: var(--gold-light);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.4px;
}
.quick-bet:active { filter: brightness(0.9); }
@media (hover: hover) {
    .quick-bet:hover { background: rgba(212,168,67,0.18); border-color: var(--gold); }
}

/* Phone layout: stack + full-width buttons, bigger touch targets */
@media (max-width: 600px) {
    #action-panel {
        left: 0;
        right: 0;
        bottom: 0;
        transform: none;
        max-width: 100vw;
        width: 100%;
        border-radius: 16px 16px 0 0;
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px;
    }
    .action-row-primary .action-btn {
        min-width: 0;
        padding: 0 8px;
        font-size: 13px;
    }
    #btn-all-in { font-size: 11px; }
    .action-row-raise { gap: 8px; }
    #raise-slider { flex: 1 1 100%; }
    .raise-input-wrap { flex: 1 1 auto; }
    .quick-bets { flex: 1 1 100%; justify-content: space-between; }
    .quick-bet { flex: 1 1 auto; min-height: 40px; }
}

/* Mobile landscape: keep action panel from overlapping the table */
@media (max-height: 500px) and (orientation: landscape) {
    #game-container {
        justify-content: flex-start;
        padding-top: 4px;
    }
    #message-log { height: 36px; }
    #game-info { top: 6px; font-size: 11px; gap: 6px; }
    #btn-mute, #btn-history { top: 4px; width: 32px; height: 32px; font-size: 15px; }
    #btn-history { right: 48px; }
    #table-area {
        width: min(92vw, 1000px);
        max-height: calc(100dvh - 170px);
        margin-top: 36px;
    }
    #action-panel {
        padding: 6px 10px calc(4px + env(safe-area-inset-bottom)) 10px;
        gap: 4px;
    }
    .action-row { gap: 6px; }
    .action-row-primary .action-btn { min-height: 36px; font-size: 12px; }
    #btn-all-in { font-size: 10px; }
    .quick-bet { min-height: 32px; font-size: 11px; padding: 0 8px; }
    #raise-slider { height: 28px; }
    .raise-input-wrap input { height: 32px; }
}

/* Thinking indicator */
.thinking-indicator {
    display: none;
    gap: 4px;
    align-items: center;
    justify-content: center;
}

.thinking-indicator.visible {
    display: flex;
}

.thinking-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: thinkingPulse 1.2s ease-in-out infinite;
}

.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes thinkingPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
}

/* Start screen */
/* History screen */
#history-screen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);
    z-index: 600;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
#history-screen.visible { display: flex; }

.history-inner {
    background: var(--bg-darker);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 24px;
    width: min(94vw, 720px);
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.history-header h2 {
    color: var(--gold);
    font-size: 22px;
}
.history-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 28px;
    cursor: pointer;
    padding: 4px 12px;

}
@media (hover: hover) { .history-close:hover { color: var(--gold); } }

.history-stats {

    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 6px 24px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);

.history-stats .stats-row .value { color: var(--text-light); font-weight: 600; }
.history-stats .stats-row .value.positive { color: var(--success); }
.history-stats .stats-row .value.negative { color: var(--danger); }

.history-table-wrap {
    overflow: auto;
    flex: 1 1 auto;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
}
.history-table {
    width: 100%;

    font-size: 13px;
}
.history-table th, .history-table td {

    text-align: left;

}
.history-table th {
    background: rgba(255,255,255,0.06);

    font-size: 11px;
    letter-spacing: 0.5px;
    position: sticky;
    top: 0;
}
.history-table td.positive { color: var(--success); font-weight: 600; }
.history-table td.negative { color: var(--danger); font-weight: 600; }

.history-actions {
    display: flex;

    flex-wrap: wrap;
    justify-content: flex-end;
}
.history-btn {
    min-height: 38px;
    padding: 0 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.06);

    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
}
.history-btn.danger { color: var(--danger); border-color: rgba(231,76,60,0.4); }
@media (hover: hover) {
    .history-btn:hover { background: rgba(255,255,255,0.12); }
}

@media (max-width: 500px) {
    .history-inner { padding: 14px; }
    .history-header h2 { font-size: 18px; }
    .history-table th, .history-table td { padding: 6px 8px; font-size: 12px; }
    .history-actions .history-btn { flex: 1 1 30%; min-width: 0; font-size: 12px; }
}

#start-screen {

#start-screen::before {

    pointer-events: none;
}

#start-screen h1 {

}

#start-screen .subtitle {

}

.start-config {

.start-config select {

.start-config select:hover,

/* Game-over stats */
#game-over-stats {
    margin-bottom: 30px;

    display: none;
}

#game-over-stats h3 {
    font-size: 14px;
    color: var(--gold);

}

.stats-row {
    display: flex;

.stats-row:last-child { border-bottom: none; }
.stats-row .label { color: var(--text-dim); }
.stats-row .value { color: var(--text-light); font-weight: 600; }

.stats-standings .stats-row .label {

.stats-rank.first { background: var(--gold); color: var(--bg-dark); }

/* Animations */
@keyframes cardDeal {
    from {
        opacity: 0;
        transform: translate(var(--deal-from-x, 0), var(--deal-from-y, -200px)) scale(0.3) rotateZ(20deg);
    }
    to {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotateZ(0deg);
    }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes winGlow {
    0%, 100% { box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
    50% { box-shadow: 0 0 40px rgba(46, 204, 113, 0.7); }
}

.win-animation {
    animation: winGlow 1s ease-in-out 3;
}

/* Showdown overlay */
#showdown-overlay {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
    pointer-events: none;
    transition: opacity 0.4s;
}

#showdown-overlay.visible {
    display: flex;
    pointer-events: auto;
}

#showdown-overlay.fading {
    opacity: 0;
}

#showdown-content {
    background: rgba(10,10,30,0.95);
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 20px 24px;
    text-align: center;
    max-width: min(92vw, 560px);
    min-width: 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}

@media (max-width: 500px) {
    #showdown-overlay { bottom: 40px; }
    #showdown-content { padding: 14px 14px; }
    .showdown-hand { flex-wrap: wrap; gap: 4px; font-size: 13px; }
    .showdown-player-name { min-width: 60px; font-size: 13px; }
    .showdown-hand-name { min-width: 0; font-size: 11px; }
}

#showdown-content h2 {
    color: var(--gold);
    margin-bottom: 16px;
    font-size: 22px;
}

.showdown-hand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.showdown-hand:last-child {
    border-bottom: none;
}

.showdown-player-name {
    font-weight: 600;
    min-width: 80px;
    text-align: left;
}

.showdown-hand-name {
    color: var(--gold-light);

}

.showdown-hand-cards {
    display: flex;

}

.winner-badge {
    background: var(--success);

    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 8px;
    margin-left: 8px;
}

/* === cards.css === */
/* Card styling - Pure CSS playing cards */

.card {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: 8px;
    position: relative;
    perspective: 600px;
    cursor: default;
    flex-shrink: 0;
}

.card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s ease;
    transform-style: preserve-3d;
}

.card.face-down .card-inner {
    transform: rotateY(180deg);
}

.card.dealing {
    animation: cardDeal 0.4s ease-out forwards;
}

/* Card front */
.card-front {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--card-white);
    border-radius: 8px;
    border: 1px solid #ccc;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2), 0 0 1px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.card-front::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 6px;
    pointer-events: none;
}

/* Card back */
.card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #1a3a6c 0%, #2a5a9a 30%, #1a3a6c 50%, #2a5a9a 70%, #1a3a6c 100%);
    border-radius: 8px;
    border: 1px solid #0f2944;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    overflow: hidden;
}

.card-back::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 2px solid rgba(212,168,67,0.3);
    border-radius: 5px;
}

.card-back::after {
    content: '';
    position: absolute;
    inset: 8px;
    background:
        repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(212,168,67,0.08) 4px, rgba(212,168,67,0.08) 8px),
        repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(212,168,67,0.08) 4px, rgba(212,168,67,0.08) 8px);
    border-radius: 3px;
}

/* Suit colors */
.card.red .card-front { color: #cc2222; }
.card.black .card-front { color: #222222; }

/* Corner ranks */
.card-corner {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
}

.card-corner-top {
    top: 4px;
    left: 5px;
}

.card-corner-bottom {
    bottom: 4px;
    right: 5px;
    transform: rotate(180deg);
}

.card-corner .rank {
    font-size: 14px;
    font-weight: 800;
    font-family: 'Georgia', serif;
}

.card-corner .suit {
    font-size: 11px;
    margin-top: -1px;
}

/* Center suit display */
.card-center {
    font-size: 28px;
    line-height: 1;
}

/* Face card styling */
.card.face-card .card-center {
    font-size: 22px;
    font-weight: 800;
    font-family: 'Georgia', serif;
    opacity: 0.8;
}

.card.face-card .card-center .face-suit {
    font-size: 14px;
    display: block;
    margin-top: 2px;
}

/* Small cards for showing in other player seats */
.card.small {
    width: calc(44px * var(--scale));
    height: calc(64px * var(--scale));
}

.card.small .card-corner .rank {
    font-size: 10px;
}

.card.small .card-corner .suit {
    font-size: 8px;
}

.card.small .card-center {
    font-size: 18px;
}

.card.small .card-corner-top {
    top: 3px;
    left: 3px;
}

.card.small .card-corner-bottom {
    bottom: 3px;
    right: 3px;
}

/* Micro cards for showdown display */
.card.micro {
    width: 36px;
    height: 52px;
}

.card.micro .card-corner { display: none; }
.card.micro .card-center { font-size: 16px; }
.card.micro .card-front {
    justify-content: center;
    gap: 0;
}
.card.micro .card-rank-top {
    font-size: 10px;
    font-weight: 800;
    position: absolute;
    top: 2px;
    left: 4px;
    font-family: 'Georgia', serif;
}

/* Card hover effect for player's own cards */
.player-seat.human .player-cards .card:hover {
    transform: translateY(-4px);
    transition: transform 0.15s ease;
}

/* Card fold animation */
.card.folding {
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0;
    transform: scale(0.8) translateY(20px);
}

/* Seat, bet, dealer-button, and position-label positions are computed dynamically
   by TableRenderer via polar geometry around the table ellipse. No fixed rules. */

</head>

                    <button class="quick-bet" data-quick="half">&frac12; Pot</button>

                    <button id="btn-history-import" class="history-btn">Import JSON</button>
                    <button id="btn-history-clear" class="history-btn danger">Clear</button>
                    <input type="file" id="history-import-input" accept="application/json" style="display:none">
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen">
            <h1>&#x2660; TEXAS HOLD'EM &#x2660;</h1>
            <p class="subtitle">No-Limit Poker &mdash; You vs AI Opponents</p>

                <label for="player-count">Players at the table</label>

                    <option value="5">5 Players (you + 4 AI)</option>

            <button id="start-btn">DEAL ME IN</button>
        </div>
