<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poker AI Simulation</title>
    <style>
        body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; color: #222; background: #fafafa; }
        h1 { font-size: 22px; margin-bottom: 6px; }
        p.intro { color: #666; margin-top: 0; }
        .ctrls { display: flex; gap: 12px; align-items: center; margin: 16px 0; padding: 12px; background: #fff; border: 1px solid #ddd; border-radius: 8px; }
        .ctrls label { display: flex; gap: 6px; align-items: center; }
        input, select { padding: 6px 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; font-size: 14px; background: #2c6cdf; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1e58c0; }
        #status { color: #555; font-style: italic; margin: 8px 0; min-height: 1.5em; }
        table { border-collapse: collapse; margin: 12px 0; background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        th, td { border: 1px solid #e5e5e5; padding: 8px 14px; text-align: right; }
        th { background: #f0f0f0; font-weight: 600; }
        th:first-child, td:first-child { text-align: left; }
        tr.pass { background: #e6f4ea; }
        tr.fail { background: #fce8e6; }
        tr.pass td:last-child { color: #137333; font-weight: 600; }
        tr.fail td:last-child { color: #c5221f; font-weight: 600; }
        table.gate td:nth-child(2) { font-family: monospace; }
        .section { margin-top: 24px; }
        h3 { margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>Poker AI Simulation</h1>
    <p class="intro">Headless run of the Game class with all delays zeroed. Validates per-personality behavior against the pass-criteria gate from the implementation plan.</p>

    <div class="ctrls">
        <label>Hands: <input id="n-hands" type="number" value="1000" min="100" max="20000" step="100"></label>
        <label>Table: <select id="table-size"><option>4</option><option>6</option><option selected>8</option><option>10</option></select></label>
        <button id="run">Run Simulation</button>
        <button id="run-cap-check" style="background:#777;">Verify Shark Cap</button>
    </div>

    <div id="status"></div>

    <div class="section">
        <h3>Per-Strategy Stats</h3>
        <div id="results">Click "Run Simulation" to populate.</div>
    </div>

    <div class="section" id="gate"></div>
    <div class="section" id="cap-results"></div>

    <script type="module" src="./sim.js"></script>
</body>
</html>
